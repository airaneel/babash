services:
  babash:
    build: .
    ports:
      - "${BABASH_PORT:-8000}:8000"
    environment:
      - BABASH_SERVER_INSTRUCTIONS=${BABASH_SERVER_INSTRUCTIONS:-}
      - BABASH_SHELL=${BABASH_SHELL:-/bin/bash}
      - BABASH_DEBUG=${BABASH_DEBUG:-}
      - BABASH_HOST=0.0.0.0
    entrypoint: ["babash_mcp", "--transport", "streamable-http"]
    volumes:
      - workspace:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  workspace:
